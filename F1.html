    // Load saved resume from localStorage if exists (for permanent storage)
    const savedResume = localStorage.getItem('user_resume_data');
    if (savedResume) {
      const resumeData = JSON.parse(savedResume);
      if (resumeData.fileData) {
        const blob = dataURItoBlob(resumeData.fileData);
        const tempUrl = URL.createObjectURL(blob);
        window.PORTFOLIO_DATA.resumeLink = tempUrl;
      }
    }
    
    function dataURItoBlob(dataURI) {
      const byteString = atob(dataURI.split(',')[1]);
      const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      return new Blob([ab], { type: mimeString });
    }

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Dark Mode Context
    const ThemeContext = React.createContext();
    const ThemeProvider = ({ children }) => {
      const [darkMode, setDarkMode] = useState(() => {
        const saved = localStorage.getItem('theme');
        return saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      });

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [darkMode]);

      return (
        <ThemeContext.Provider value={{ darkMode, setDarkMode }}>
          {children}
        </ThemeContext.Provider>
      );
    };
    const useTheme = () => React.useContext(ThemeContext);

    const ResumeUpload = ({ currentResumeUrl, onResumeUpdate }) => {
      const [uploadStatus, setUploadStatus] = useState('');
      const [savedFileName, setSavedFileName] = useState('');
      
      useEffect(() => {
        const savedResume = localStorage.getItem('user_resume_data');
        if (savedResume) {
          const resumeData = JSON.parse(savedResume);
          if (resumeData.fileName) {
            setSavedFileName(resumeData.fileName);
          }
        }
      }, []);
      
      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        
        const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
        if (!validTypes.includes(file.type)) {
          alert('Please upload a PDF, DOC, or DOCX file');
          return;
        }
        
        if (file.size > 5 * 1024 * 1024) {
          alert('File size should be less than 5MB');
          return;
        }
        
        setUploadStatus('loading');
        
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64String = reader.result;
          const resumeData = {
            fileData: base64String,
            fileName: file.name,
            fileType: file.type,
            uploadDate: new Date().toISOString()
          };
          localStorage.setItem('user_resume_data', JSON.stringify(resumeData));
          setSavedFileName(file.name);
          setUploadStatus('success');
          const tempUrl = URL.createObjectURL(file);
          onResumeUpdate(tempUrl);
          setTimeout(() => setUploadStatus(''), 3000);
        };
        reader.readAsDataURL(file);
      };
      
      const handleDownload = () => {
        const savedResume = localStorage.getItem('user_resume_data');
        if (savedResume) {
          const resumeData = JSON.parse(savedResume);
          if (resumeData.fileData) {
            const link = document.createElement('a');
            link.href = resumeData.fileData;
            link.download = resumeData.fileName || 'resume';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          }
        }
      };
      
      const handleDelete = () => {
        if (confirm('Are you sure you want to delete your saved resume?')) {
          localStorage.removeItem('user_resume_data');
          setSavedFileName('');
          onResumeUpdate(null);
          setUploadStatus('deleted');
          setTimeout(() => setUploadStatus(''), 3000);
        }
      };
      
      return (
        <div className="mt-4 p-4 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm">
          <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
            <div className="flex-1">
              <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                📄 Upload Your Resume (PDF/DOC) - Saved Permanently
              </label>
              <input
                type="file"
                accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                onChange={handleFileUpload}
                className="block w-full text-sm text-gray-500 dark:text-gray-400
                  file:mr-4 file:py-2 file:px-4
                  file:rounded-lg file:border-0
                  file:text-sm file:font-semibold
                  file:bg-blue-50 file:text-blue-700
                  dark:file:bg-blue-900 dark:file:text-blue-200
                  hover:file:bg-blue-100"
              />
              {savedFileName && (
                <p className="text-xs text-blue-600 dark:text-blue-400 mt-1">
                  ✅ Saved: {savedFileName}
                </p>
              )}
            </div>
            <div className="flex gap-2">
              {savedFileName && (
                <>
                  <button
                    onClick={handleDownload}
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2 shadow-sm"
                  >
                    <i className="fas fa-download"></i> Download
                  </button>
                  <button
                    onClick={handleDelete}
                    className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2 shadow-sm"
                  >
                    <i className="fas fa-trash"></i> Delete
                  </button>
                </>
              )}
            </div>
          </div>
          {uploadStatus === 'loading' && <p className="text-blue-600 dark:text-blue-400 text-sm mt-2">⏳ Processing...</p>}
          {uploadStatus === 'success' && <p className="text-green-600 dark:text-green-400 text-sm mt-2">✅ Resume saved permanently!</p>}
          {uploadStatus === 'deleted' && <p className="text-red-600 dark:text-red-400 text-sm mt-2">🗑️ Resume deleted.</p>}
        </div>
      );
    };

    const ProjectCard = ({ project }) => {

            <div className="flex flex-wrap gap-4 justify-center">

              <a href="#internships" className="px-6 py-3 border border-blue-600 text-blue-600 dark:text-blue-400 rounded-lg font-medium hover:bg-blue-50 dark:hover:bg-blue-900/30 transition">View Internships</a>

              <a href="#certifications" className="px-6 py-3 border border-blue-600 text-blue-600 dark:text-blue-400 rounded-lg font-medium hover:bg-blue-50 dark:hover:bg-blue-900/30 transition">Certifications</a>
              
              {data.resumeLink ? (

                  <i className="fas fa-download"></i> Resume

                <button onClick={() => setShowUploader(true)} className="px-6 py-3 border border-blue-600 text-blue-600 dark:text-blue-400 rounded-lg font-medium hover:bg-blue-50 transition flex items-center gap-2">
                  <i className="fas fa-upload"></i> Upload Resume
                </button>
              )}
            </div>
            {showUploader && (
              <div className="mt-8">
                <ResumeUpload currentResumeUrl={data.resumeLink} onResumeUpdate={onResumeUpdate} />
                <button onClick={() => setShowUploader(false)} className="mt-2 text-sm text-gray-500 hover:text-gray-700">Close</button>
              </div>
            )}
          </div>
        </section>
      );
    };

                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </section>
      );
    };

    const ProjectsPage = ({ projects }) => {
      return (
        <section className="px-4 py-16 max-w-7xl mx-auto">
          <h2 className="text-3xl md:text-4xl font-bold text-gray-800 dark:text-white mb-12 text-center">Featured Projects</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            {projects.map((project, idx) => <ProjectCard key={idx} project={project} />)}
          </div>
        </section>
      );
    };

    const ContactPage = () => {
      const [formData, setFormData] = useState({ name: '', email: '', message: '' });
      const [status, setStatus] = useState({ type: '', message: '' });
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          await new Promise(resolve => setTimeout(resolve, 800));
          const messages = JSON.parse(localStorage.getItem('contact_messages') || '[]');
          messages.push({ ...formData, timestamp: new Date().toISOString() });
          localStorage.setItem('contact_messages', JSON.stringify(messages));
          setStatus({ type: 'success', message: 'Message sent! I will get back to you soon.' });
          setFormData({ name: '', email: '', message: '' });
        } catch (err) {
          setStatus({ type: 'error', message: 'Something went wrong.' });
        } finally { setLoading(false); }
      };

      return (
        <section className="px-4 py-16 max-w-3xl mx-auto">
          <h2 className="text-3xl md:text-4xl font-bold text-gray-800 dark:text-white mb-8 text-center">Get In Touch</h2>
          <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 md:p-8 border border-gray-100 dark:border-gray-700">
            <form onSubmit={handleSubmit} className="space-y-6">
              <div><label className="block text-gray-700 dark:text-gray-300 font-medium mb-2">Your Name</label><input type="text" name="name" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} required className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white" /></div>
              <div><label className="block text-gray-700 dark:text-gray-300 font-medium mb-2">Email</label><input type="email" name="email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} required className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" /></div>
              <div><label className="block text-gray-700 dark:text-gray-300 font-medium mb-2">Message</label><textarea name="message" rows="5" value={formData.message} onChange={(e) => setFormData({...formData, message: e.target.value})} required className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"></textarea></div>
              {status.message && <div className={`p-3 rounded-lg ${status.type === 'success' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300'}`}>{status.message}</div>}
              <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition shadow-md">{loading ? 'Sending...' : 'Send Message'}</button>
            </form>
            <div className="mt-6 text-center text-gray-500 dark:text-gray-400 text-sm">Or reach me at <a href={`mailto:${window.PORTFOLIO_DATA.socials.email}`} className="text-blue-600 dark:text-blue-400">{window.PORTFOLIO_DATA.socials.email}</a></div>
          </div>
        </section>
      );
    };

    const Navbar = () => {
      const { darkMode, setDarkMode } = useTheme();
      const [active, setActive] = useState('home');
      const scrollToSection = (sectionId) => {
        document.getElementById(sectionId)?.scrollIntoView({ behavior: 'smooth' });
        setActive(sectionId);
      };

      return (
        <nav className="sticky top-0 z-50 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between items-center h-16">
              <div></div>
              <div className="hidden md:flex space-x-8">
                {['home', 'about', 'certifications', 'achievements', 'internships', 'projects', 'contact'].map((item) => (
                  <button key={item} onClick={() => scrollToSection(item)} className={`capitalize font-medium transition ${active === item ? 'text-blue-600 dark:text-blue-400' : 'text-gray-700 dark:text-gray-300 hover:text-blue-500'}`}>{item}</button>
                ))}
              </div>
              <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300">{darkMode ? <i className="fas fa-sun text-yellow-400"></i> : <i className="fas fa-moon"></i>}</button>
            </div>
          </div>
        </nav>
      );
    };

    const Footer = ({ socials }) => (
      <footer className="bg-gray-50 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-8 mt-16">
        <div className="max-w-7xl mx-auto px-4 text-center">
          <div className="flex justify-center space-x-6 mb-4">
            {socials.github && <a href={socials.github} target="_blank" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 text-xl"><i className="fab fa-github"></i></a>}
            {socials.linkedin && <a href={socials.linkedin} target="_blank" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 text-xl"><i className="fab fa-linkedin"></i></a>}
            {socials.twitter && <a href={socials.twitter} target="_blank" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 text-xl"><i className="fab fa-twitter"></i></a>}
            {socials.email && <a href={`mailto:${socials.email}`} className="text-gray-600 dark:text-gray-400 hover:text-blue-600 text-xl"><i className="fas fa-envelope"></i></a>}
          </div>
          <p className="text-gray-500 dark:text-gray-500 text-sm">© {new Date().getFullYear()} {window.PORTFOLIO_DATA.name}. All rights reserved.</p>
        </div>
      </footer>
    );

    const MainContent = ({ portfolio, onResumeUpdate }) => (
      <div className="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
        <Navbar />
        <main>
          <section id="home"><HomePage data={portfolio} onResumeUpdate={onResumeUpdate} /></section>
          <section id="about"><AboutPage data={portfolio} /></section>
          <section id="certifications"><CertificationsPage certifications={portfolio.certifications} /></section>
          <section id="achievements"><AchievementsPage achievements={portfolio.achievements} /></section>
          <section id="internships"><InternshipsPage internships={portfolio.internships} /></section>
          <section id="projects"><ProjectsPage projects={portfolio.projects} /></section>
          <section id="contact"><ContactPage /></section>
        </main>
        <Footer socials={portfolio.socials} />
      </div>
    );

    const App = () => {
      const [portfolio, setPortfolio] = useState(null);
      useEffect(() => setPortfolio(window.PORTFOLIO_DATA), []);
      const handleResumeUpdate = (newUrl) => setPortfolio(prev => ({ ...prev, resumeLink: newUrl }));
      if (!portfolio) return <div className="flex justify-center items-center h-screen">Loading...</div>;
      return <ThemeProvider><MainContent portfolio={portfolio} onResumeUpdate={handleResumeUpdate} /></ThemeProvider>;
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
    .dark { color-scheme: dark; }
  </style>
</body>
</html>
